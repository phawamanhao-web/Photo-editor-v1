<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Web PUBG Mini-Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 5px;
        }
        #instructions {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 20;
            cursor: pointer;
        }
        #instructions h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #ffb300;
        }
        #instructions p {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">Targets Eliminated: <span id="score">0</span></div>
    
    <div id="instructions">
        <h1>3D BATTLEGROUNDS MINI</h1>
        <p><strong>CLICK TO PLAY</strong></p>
        <p>Move: WASD | Look: MOUSE | Shoot: LEFT CLICK</p>
    </div>

    <!-- Include Three.js and PointerLockControls from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- 1. SETUP SCENE, CAMERA, & RENDERER ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 2; // Approximate human height

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 3. ENVIRONMENT (BATTLEGROUND) ---
        // Green Ground
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const instructions = document.getElementById('instructions');

            controls.lock();
        });

        controls.addEventListener('lock', () => {
            instructions.style.display = 'none';
        });

            instructions.style.display = 'flex';
        });

            if (e.code === 'KeyA') move.left = true;
            if (e.code === 'KeyD') move.right = true;
        });
